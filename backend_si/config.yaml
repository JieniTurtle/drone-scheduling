# PSOScheduler 配置文件
# 修改这里的参数即可调整调度行为，无需改代码
# 加载入口：backend_si/pso_scheduler.py:PSOScheduler.__init__
# 调用方法：PSOScheduler(num_drones=N)               -> 用本文件
#         PSOScheduler(num_drones=N, config_path=…) -> 用其他配置文件

# ---------------------------------------------------------------
# 随机数种子（用于实验可复现性）
# ---------------------------------------------------------------
seed: 0  # 设置为固定值以保证实验可复现；设为 null 则使用随机种子

# ---------------------------------------------------------------
# 双通道外层分配
# ---------------------------------------------------------------
dual_channel:
  # 新任务到达时若所有无人机都忙，则进 pending_buffer
  # buffer 中任务数 >= 此阈值时立即触发 PSO 批量分配
  buffer_size_threshold: 8

  # buffer 中任一任务的剩余时间(remaining_time) < 此值时
  # 立即触发 PSO（紧急任务，不等窗口满）
  emergency_ttl: 100.0

  # buffer 中最早任务停留超过此时间步数时触发 PSO
  # 防止任务来得太慢、buffer 始终不满导致饿死
  buffer_timeout: 50

# ---------------------------------------------------------------
# PSO 算法核心参数（PSOOptimizer 使用）
# ---------------------------------------------------------------
pso:
  # 粒子数量
  num_particles: 20
  # 最大迭代次数
  max_iterations: 30
  # 惯性权重 w
  inertia: 0.7
  # 个体学习因子 c1
  cognitive: 1.5
  # 社会学习因子 c2
  social: 1.5
  # velocity 每个分量的绝对值上限（方案 A 偏好矩阵编码用）
  v_max: 4.0
  # position 偏好分每个分量的绝对值上限（防数值发散）
  pos_max: 5.0

# ---------------------------------------------------------------
# 适应度函数权重（多目标加权求和；PSO 内部已对每项归一化到 [0,1]）
# ---------------------------------------------------------------
fitness_weights:
  on_time_rate: 0.4   # 准时率
  avg_delay: 0.4      # 平均时延
  energy: 0.2         # 能耗

# ---------------------------------------------------------------
# 内层动态贪心评分权重
# 评分 = priority*w_p + urgency*w_u - distance*w_d
# 在每架无人机送完一次货后，对其剩余任务队列按此评分动态重排
# ---------------------------------------------------------------
dynamic_greedy:
  # 任务优先级权重（priority ∈ [1, 5]，越大越优先）
  priority: 10.0
  # 紧迫度权重（urgency = 1 / max(1, remaining_time)）
  urgency: 500.0
  # 距离惩罚权重（从无人机当前位置到任务起点的欧氏距离）
  distance: 1.0

# ---------------------------------------------------------------
# 无人机物理参数（与 frontend/drone.py 保持一致）
# ---------------------------------------------------------------
drone:
  capacity: 5      # 最大载重
  speed: 200.0     # 飞行速度
